
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SurroLink – Book Your Consultation</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #5B3FE4;
      --text-dark: #111827;
      --text-mid: #374151;
      --text-muted: #9CA3AF;
      --border: #E5E7EB;
      --input-bg: #F9F9FB;
      --white: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--text-dark);
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: var(--white);
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--purple);
      letter-spacing: -0.3px;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-mid);
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--purple); }
    .nav-links a.active { color: var(--purple); }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .nav-user-name {
      font-size: 14.5px;
      font-weight: 500;
      color: var(--text-dark);
    }

    .nav-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    /* ── MAIN LAYOUT ── */
    .page-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 64px);
      align-items: start;
    }

    /* ── FORM SIDE ── */
    .form-side {
      padding: 60px 64px 60px 80px;
      display: flex;
      flex-direction: column;
    }

    .form-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 36px;
      text-align: center;
    }

    .field-group {
      margin-bottom: 24px;
    }

    .field-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .field-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s;
    }

    .field-input::placeholder { color: var(--text-muted); }
    .field-input:focus { border-color: var(--purple); }

    /* Date field with calendar icon */
    .input-icon-wrapper {
      position: relative;
    }

    .input-icon-wrapper .field-input {
      padding-right: 44px;
    }

    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    /* Dropdown / select */
    .field-select-wrapper {
      position: relative;
    }

    .field-select {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-muted);
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .field-select:focus { border-color: var(--purple); }

    .select-chevron {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    /* Contact Method radio options */
    .contact-options {
      display: flex;
      gap: 14px;
    }

    .contact-option {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: var(--white);
      transition: border-color 0.2s;
    }

    .contact-option:hover { border-color: var(--purple); }

    .contact-option input[type="radio"] {
      accent-color: var(--purple);
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .contact-option-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Privacy note */
    .privacy-note {
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      margin-top: 16px;
      margin-bottom: 32px;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--purple);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.1px;
    }

    .btn-submit:hover { opacity: 0.88; }

    /* ── IMAGE SIDE ── */
    .image-side {
      height: 100%;
      min-height: calc(100vh - 64px);
    }

    .image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="logo" href="#">SurroLink</a>
    <ul class="nav-links">
      <li><a href="../Home/home.html">Home</a></li>
      <li><a href="../Sur2/sur.html">Resource Hub</a></li>
      <li><a href="../Legal/legal.html">Legal Experts</a></li>
      <li><a href="../Clinic1/clinic.html" class="active">Clinics</a></li>
      <li><a href="../Community/community.html">Community</a></li>
    </ul>
    <div class="nav-user">
      <span class="nav-user-name">Adaeze Orji</span>
      <img
        class="nav-avatar"
        src="https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=100&q=80"
        alt="Adaeze Orji"
      />
    </div>
  </nav>

  <!-- TWO-COLUMN LAYOUT -->
  <div class="page-layout">

    <!-- LEFT: FORM -->
    <div class="form-side">
      <h2 class="form-title">Book Your Consultation</h2>

      <!-- Specialist/Clinic -->
      <div class="field-group">
        <label class="field-label" for="specialist">Specialist/Clinic</label>
        <input
          class="field-input"
          id="specialist"
          type="text"
          placeholder="Specialist/Clinic name"
        />
      </div>

      <!-- Preferred Date -->
      <div class="field-group">
        <label class="field-label" for="pref-date">Preferred Date</label>
        <div class="input-icon-wrapper">
          <input
            class="field-input"
            id="pref-date"
            type="text"
            placeholder=""
          />
          <span class="input-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Preferred Time Slot -->
      <div class="field-group">
        <label class="field-label" for="time-slot">Preferred Time Slot</label>
        <div class="field-select-wrapper">
          <select class="field-select" id="time-slot">
            <option value="" disabled selected></option>
            <option>9:00 AM – 10:00 AM</option>
            <option>10:00 AM – 11:00 AM</option>
            <option>11:00 AM – 12:00 PM</option>
            <option>1:00 PM – 2:00 PM</option>
            <option>2:00 PM – 3:00 PM</option>
            <option>3:00 PM – 4:00 PM</option>
          </select>
          <span class="select-chevron">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Contact Method -->
      <div class="field-group">
        <label class="field-label">Contact Method</label>
        <div class="contact-options">

          <label class="contact-option">
            <input type="radio" name="contact" value="whatsapp" />
            <span class="contact-option-label">
              Whatsapp
              <!-- WhatsApp green icon -->
              <svg width="18" height="18" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="16" fill="#25D366"/>
                <path d="M22.9 9.1A9.7 9.7 0 0 0 16 6.3a9.7 9.7 0 0 0-8.4 14.6L6.3 25.7l4.9-1.3A9.7 9.7 0 0 0 16 25.7a9.7 9.7 0 0 0 9.7-9.7 9.7 9.7 0 0 0-2.8-6.9zm-6.9 14.9a8 8 0 0 1-4.1-1.1l-.3-.2-3 .8.8-2.9-.2-.3a8 8 0 1 1 6.8 3.7zm4.4-5.9c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.7.9-.3.1-.5 0a6.4 6.4 0 0 1-1.9-1.2 7.1 7.1 0 0 1-1.3-1.6c-.1-.2 0-.4.1-.5l.4-.4.2-.3v-.3l-.7-1.7c-.2-.4-.4-.4-.5-.4h-.5a.9.9 0 0 0-.7.3 2.8 2.8 0 0 0-.9 2.1 4.9 4.9 0 0 0 1 2.6 11.2 11.2 0 0 0 4.3 3.8c.6.3 1.1.4 1.4.5a3.4 3.4 0 0 0 1.6.1 2.6 2.6 0 0 0 1.7-1.2 2.1 2.1 0 0 0 .1-1.2c-.1-.1-.3-.2-.5-.3z" fill="#fff"/>
              </svg>
            </span>
          </label>

          <label class="contact-option">
            <input type="radio" name="contact" value="phone" />
            <span class="contact-option-label">
              Phone Call
              <!-- Phone amber icon -->
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6.6 10.8a15.1 15.1 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.2 11.4 11.4 0 0 0 3.6.6 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.4 11.4 0 0 0 .6 3.6 1 1 0 0 1-.3 1z" fill="#F59E0B"/>
              </svg>
            </span>
          </label>

        </div>

        <!-- Privacy note -->
        <div class="privacy-note">
          Your contact details are only shared with the clinic once you confirm.
        </div>
      </div>

      <!-- Submit -->
      <button class="btn-submit">Request Consultation</button>
    </div>

    <!-- RIGHT: IMAGE -->
    <div class="image-side">
      <img
        src="https://images.unsplash.com/photo-1612349316228-5942a9b489c2?w=900&q=80"
        alt="Nigerian family with baby"
      />
    </div>

  </div>

</body>
</html>
